listen_addresses = '*'                  # what IP address(es) to listen on;
port = 5432                             # (change requires restart)
password_encryption = scram-sha-256     # md5 or scram-sha-256
dynamic_shared_memory_type = posix      # the default is the first option

log_destination = 'stderr'              # Valid values are combinations of
logging_collector = on                  # Enable capturing of stderr and csvlog
log_directory = 'log'                   # directory where log files are written,
log_filename = 'postgresql-%a.log'      # log file name pattern,
log_truncate_on_rotation = on           # If on, an existing log file with the
log_rotation_age = 1d                   # Automatic rotation of logfiles will
log_rotation_size = 0                   # Automatic rotation of logfiles will
log_line_prefix = '%m [%p] '            # special values:
log_timezone = 'UTC'
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'                     # locale for system error message
lc_monetary = 'en_US.UTF-8'                     # locale for monetary formatting
lc_numeric = 'en_US.UTF-8'                      # locale for number formatting
lc_time = 'en_US.UTF-8'                         # locale for time formatting
default_text_search_config = 'pg_catalog.english'
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# MEMORY
shared_buffers = 8GB                  # 25% of RAM
effective_cache_size = 24GB           # 75% of RAM
work_mem = 64MB                       # for sorting/hashing per operation
maintenance_work_mem = 2GB            # for VACUUM, CREATE INDEX, etc

# CHECKPOINT
checkpoint_completion_target = 0.9
wal_buffers = 64MB
min_wal_size = 1GB
max_wal_size = 4GB

# PARALLELISM
max_worker_processes = 8              # matches vCPU count
max_parallel_workers = 8             # matches vCPU count
max_parallel_workers_per_gather = 4  # half vCPU count
max_parallel_maintenance_workers = 4 # half vCPU count

# CONNECTIONS
max_connections = 200

# PLANNER
default_statistics_target = 100
random_page_cost = 1.1               # low value = SSD (EBS gp3)
effective_io_concurrency = 200       # SSD/EBS

# LOGGING (optional but useful)
log_min_duration_statement = 1000    # log queries over 1s
log_checkpoints = on
log_connections = on

# WAL
wal_level = replica
