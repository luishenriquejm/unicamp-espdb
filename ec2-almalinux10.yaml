AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Private EC2 instance running AlmaLinux 10 with outbound internet access
  via NAT Gateway. No public IP assigned.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge
    Description: EC2 instance type.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair for SSH access (via bastion / SSM).

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.

  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR for the public subnet (hosts the NAT Gateway).

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR for the private subnet (hosts the EC2 instance).

  RootVolumeSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 500
    Description: Root EBS volume size in GiB.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  # ── Internet Gateway (needed so the NAT GW can reach the internet) ─────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── Subnets ────────────────────────────────────────────────────────────────
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true          # NAT GW ENI needs a public IP
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-subnet'

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false         # instance stays private
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-subnet'

  # ── NAT Gateway (gives the private instance outbound internet access) ──────
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nat-gw'

  # ── Route Tables ───────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-rt'

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway        # outbound via NAT, no public IP needed

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # ── Security Group ─────────────────────────────────────────────────────────
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >
        Private instance SG — no inbound from internet;
        all outbound allowed so the instance can download packages.
      VpcId: !Ref VPC
      # No ingress rules → no inbound traffic from outside the VPC.
      # Add SSH from a bastion / VPN CIDR here if needed, e.g.:
      # SecurityGroupIngress:
      #   - IpProtocol: tcp
      #     FromPort: 22
      #     ToPort: 22
      #     CidrIp: 10.0.1.0/24    # bastion subnet only
      SecurityGroupEgress:
        - IpProtocol: '-1'          # all traffic
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance-sg'

  # ── IAM Role + Instance Profile (enables SSM Session Manager) ─────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-instance-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Allows shell access without opening SSH to the internet
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance-role'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ── EC2 Instance ───────────────────────────────────────────────────────────
  PrivateInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0145d8249c8d19b24     # AlmaLinux 10 (update per region)
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PrivateSubnet
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      # UserData runs once at first boot — installs SSM agent & updates packages
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euo pipefail

          # Update all packages
          dnf update -y

          # Install and enable the AWS SSM Agent
          # (already included in most AlmaLinux AMIs; this ensures it's running)
          dnf install -y amazon-ssm-agent
          systemctl enable --now amazon-ssm-agent

          echo "Bootstrap complete."
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-instance'

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref PrivateInstance

  PrivateIpAddress:
    Description: Private IP address of the instance
    Value: !GetAtt PrivateInstance.PrivateIp

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  NatGatewayEIP:
    Description: >
      Public IP used by the NAT Gateway for outbound traffic
      (the instance itself has no public IP).
    Value: !Ref NatEIP

  SSMConnectCommand:
    Description: >
      Connect to the instance without SSH using AWS Systems Manager
      (no public IP or bastion required).
    Value: !Sub 'aws ssm start-session --target ${PrivateInstance} --region ${AWS::Region}'
